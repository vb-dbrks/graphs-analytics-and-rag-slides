# Databricks App config — runs the pre-built slide deck with a zero-dep
# stdlib server. Databricks Apps cannot reach the internal npm proxy, so
# all JS build + npm install happens on your laptop via
# `./scripts/build-deploy.sh`. Only the built `dist/` + this server run
# inside the App. DATABRICKS_APP_PORT is injected at startup.
command:
  - node
  - server.mjs
